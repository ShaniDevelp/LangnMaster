<!doctype html>
<meta charset="utf-8">
<title>Bayyan — logo</title>
<style>
  body { font-family: 'Poppins','Segoe UI',sans-serif; margin:0; background:#f4f4f7; color:#1e1350; }
  .wrap { max-width:880px; margin:48px auto; padding:0 24px; }
  h1 { font-weight:700; }
  .row { display:flex; gap:24px; flex-wrap:wrap; margin:24px 0; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:20px; padding:32px; display:flex; align-items:center; justify-content:center; flex:1; min-width:260px; }
  .dark { background:#1e1350; color:#fff; }
  .sizes { display:flex; align-items:center; gap:20px; }
  .label { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:#6b7280; margin-bottom:8px; }
</style>
<div class="wrap">
  <h1>Bayyan — logo</h1>

  <div class="label">Horizontal lockup</div>
  <div class="row">
    <div class="card"><img src="./bayyan-logo.svg" width="248" height="64" alt=""></div>
    <div class="card dark"><img src="./bayyan-logo-mono.svg" width="248" height="64" alt="" style="color:#fff"></div>
  </div>

  <div class="label">App icon / favicon (mark)</div>
  <div class="row">
    <div class="card sizes">
      <img src="./bayyan-mark.svg" width="96" height="96" alt="">
      <img src="./bayyan-mark.svg" width="64" height="64" alt="">
      <img src="./bayyan-mark.svg" width="32" height="32" alt="">
      <img src="./bayyan-mark.svg" width="16" height="16" alt="">
    </div>
  </div>
</div>
